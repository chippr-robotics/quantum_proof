# Builds the Astro SPA in site/ and deploys it to GitHub Pages.
#
# Repo setup (one-time, manual):
#   Settings → Pages → Source: GitHub Actions
#
# DNS (one-time, manual):
#   CNAME quantum.chipprbots.com → chippr-robotics.github.io
#   The Pages CNAME file ships in site/public/CNAME.
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'oathbreaker/docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync oathbreaker docs
        run: npm run sync-docs

      - name: Build Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
