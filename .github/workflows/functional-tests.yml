name: Functional Tests

on:
  push:
    branches: [main]
    paths:
      - "oathbreaker/**"
      - ".github/workflows/functional-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "oathbreaker/**"
      - ".github/workflows/functional-tests.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Full workspace integration test — verifies that all crates compose
  # correctly across the dependency chain:
  #
  #   goldilocks-field → ec-goldilocks → reversible-arithmetic
  #                                    → group-action-circuit
  #                                    → sp1-program / sp1-host / benchmark
  #
  # This catches cross-crate interface breakage that isolated unit tests miss.
  # ---------------------------------------------------------------------------
  workspace-test:
    name: "workspace / test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oathbreaker
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oathbreaker/target
          key: workspace-test-${{ runner.os }}-cargo-${{ hashFiles('oathbreaker/**/Cargo.toml') }}
          restore-keys: |
            workspace-test-${{ runner.os }}-cargo-

      - name: Build entire workspace (debug)
        run: cargo build --workspace --verbose

      - name: Run all workspace tests (debug)
        run: cargo test --workspace --verbose

      - name: Build entire workspace (release)
        run: cargo build --workspace --release --verbose

      - name: Run all workspace tests (release)
        run: cargo test --workspace --release --verbose

  # ---------------------------------------------------------------------------
  # Cross-crate integration — explicitly verify the layered dependency chain
  # by running each crate's tests with all transitive dependencies built,
  # in dependency order. This validates that the algebraic guarantees compose:
  #
  #   1. Field axioms hold                     (goldilocks-field)
  #   2. EC group law built on valid field      (ec-goldilocks)
  #   3. Reversible gates preserve field ops    (reversible-arithmetic)
  #   4. Group-action circuit is coherent       (group-action-circuit)
  # ---------------------------------------------------------------------------
  dependency-chain:
    name: "integration / dependency chain"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oathbreaker
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oathbreaker/target
          key: depchain-${{ runner.os }}-cargo-${{ hashFiles('oathbreaker/**/Cargo.toml') }}
          restore-keys: |
            depchain-${{ runner.os }}-cargo-

      - name: "Layer 1: Field axioms (goldilocks-field)"
        run: cargo test -p goldilocks-field --release --verbose

      - name: "Layer 2: EC group law (ec-goldilocks)"
        run: cargo test -p ec-goldilocks --release --verbose

      - name: "Layer 3: Reversible gates (reversible-arithmetic)"
        run: cargo test -p reversible-arithmetic --release --verbose

      - name: "Layer 4: Coherent group-action circuit (group-action-circuit)"
        run: cargo test -p group-action-circuit --release --verbose

  # ---------------------------------------------------------------------------
  # Benchmark smoke test — verify the benchmark crate compiles and runs
  # without panicking. Full resource counting, scaling projections, and QASM
  # export with downloadable artifacts are in the dedicated benchmark.yml
  # workflow.
  # ---------------------------------------------------------------------------
  benchmark:
    name: "functional / benchmark"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oathbreaker
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oathbreaker/target
          key: benchmark-${{ runner.os }}-cargo-${{ hashFiles('oathbreaker/**/Cargo.toml') }}
          restore-keys: |
            benchmark-${{ runner.os }}-cargo-

      - name: Build benchmark binary
        run: cargo build --release -p benchmark --verbose

      - name: Run benchmark suite
        run: cargo run --release -p benchmark

  # ---------------------------------------------------------------------------
  # SP1 classical verification — verify sp1-program and sp1-host compile
  # cleanly and run classical mode end-to-end.
  # Classical mode verifies the full data pipeline without the SP1 toolchain:
  #   param loading → test generation → circuit build → verification
  # ---------------------------------------------------------------------------
  sp1-classical:
    name: "functional / sp1 classical verification"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oathbreaker
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oathbreaker/target
          key: sp1-classical-${{ runner.os }}-cargo-${{ hashFiles('oathbreaker/**/Cargo.toml') }}
          restore-keys: |
            sp1-classical-${{ runner.os }}-cargo-

      - name: Build sp1-program (classical mode)
        run: cargo build -p sp1-program --verbose

      - name: Build sp1-host (classical mode)
        run: cargo build -p sp1-host --verbose

      - name: Run sp1-program self-test
        run: cargo run --release -p sp1-program

      - name: "Classical verification: Oath-8 (5 test cases)"
        run: cargo run --release -p sp1-host -- --tier oath-8 --num-cases 5

      - name: "Classical verification: Oath-16 (3 test cases)"
        run: cargo run --release -p sp1-host -- --tier oath-16 --num-cases 3

  # ---------------------------------------------------------------------------
  # SP1 ZK proof generation — install SP1 toolchain, compile the guest to
  # RISC-V, execute inside the zkVM, and generate a compressed STARK proof.
  # Uploads proof artifacts for downstream consumption.
  # ---------------------------------------------------------------------------
  sp1-proof:
    name: "functional / sp1 proof generation"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oathbreaker
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - name: Install SP1 (sp1up)
        run: |
          export PATH="$HOME/.sp1/bin:$PATH"
          sp1up

      - name: Cache cargo registry & SP1 build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oathbreaker/target
          key: sp1-proof-${{ runner.os }}-cargo-${{ hashFiles('oathbreaker/**/Cargo.toml') }}
          restore-keys: |
            sp1-proof-${{ runner.os }}-cargo-

      - name: "SP1 execute: Oath-8 (validate guest in zkVM)"
        run: cargo run --release -p sp1-host --features sp1 -- --tier oath-8 --num-cases 5 --mode execute

      - name: "SP1 prove: Oath-8 (generate compressed STARK proof)"
        run: cargo run --release -p sp1-host --features sp1 -- --tier oath-8 --num-cases 5 --mode prove --proof-type compressed --output-dir proofs

      - name: List proof artifacts
        run: ls -la proofs/

      - name: Display circuit summary
        run: cat proofs/circuit_summary.json

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sp1-proof-oath8
          path: |
            oathbreaker/proofs/proof.bin
            oathbreaker/proofs/vk.json
            oathbreaker/proofs/circuit_summary.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Summary gate — all functional test jobs must pass.
  # ---------------------------------------------------------------------------
  functional-tests-pass:
    name: "All functional tests pass"
    if: always()
    needs: [workspace-test, dependency-chain, benchmark, sp1-classical, sp1-proof]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all functional test results
        run: |
          results=("${{ needs.workspace-test.result }}" \
                   "${{ needs.dependency-chain.result }}" \
                   "${{ needs.benchmark.result }}" \
                   "${{ needs.sp1-classical.result }}" \
                   "${{ needs.sp1-proof.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::One or more functional tests failed or were cancelled"
              exit 1
            fi
          done
          echo "All functional tests passed."
